# Cloudflare Workers 配置，线上已由deploy.yml接管，这里仅供本地测试
name = "cf-server-monitor-pro"
main = "src/index.js"
compatibility_date = "2024-01-01"

# 本地开发环境变量
[vars]
API_SECRET = "admin"
API_USER_NAME = "admin"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "cf-server-monitor-db"
database_id = "local"  # 本地开发时用 "local" 即可

# 开发服务器配置
[dev]
port = 8789
local_protocol = "http"
